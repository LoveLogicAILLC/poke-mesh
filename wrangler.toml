# Cloudflare Workers configuration
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

# Replace with your worker's name (kebab-case, no spaces)
name = "poke-mesh"

compatibility_date = "2026-03-19"

# Entry point
main = "src/index.ts"

# Set to true if deploying to Cloudflare Workers (vs. Node runtime)
# workers_dev = true

# ── Environment variables ─────────────────────────────────────────────────────
# [vars]
# MY_VAR = "value"

# ── KV Namespaces ─────────────────────────────────────────────────────────────
# [[kv_namespaces]]
# binding = "MY_KV"
# id = "<KV_NAMESPACE_ID>"

# ── R2 Buckets ────────────────────────────────────────────────────────────────
# [[r2_buckets]]
# binding = "MY_BUCKET"
# bucket_name = "my-bucket"

# ── D1 Databases ──────────────────────────────────────────────────────────────
# [[d1_databases]]
# binding = "DB"
# database_name = "my-database"
# database_id = "<D1_DATABASE_ID>"

# ── Environments ──────────────────────────────────────────────────────────────
# [env.staging]
# name = "your-worker-name-staging"

# [env.production]
# name = "your-worker-name-production"
