name = "poke-mesh"
main = "src/index.ts"
compatibility_date = "2026-03-19"
compatibility_flags = ["nodejs_compat"]

# Development
[dev]
port = 3000
local_protocol = "http"

# Environment variables
[vars]
MESH_GOSSIP_INTERVAL_MS = "5000"
MESH_MAX_AGENTS = "100"
LOG_LEVEL = "info"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "poke-mesh-db"
database_id = "PLACEHOLDER_D1_ID"

# KV Namespace for mesh state cache
[[kv_namespaces]]
binding = "MESH_CACHE"
id = "PLACEHOLDER_KV_ID"

# Staging environment
[env.staging]
name = "poke-mesh-staging"
[env.staging.vars]
LOG_LEVEL = "debug"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "poke-mesh-db-staging"
database_id = "PLACEHOLDER_STAGING_D1_ID"

[[env.staging.kv_namespaces]]
binding = "MESH_CACHE"
id = "PLACEHOLDER_STAGING_KV_ID"

# Production environment
[env.production]
name = "poke-mesh"
[env.production.vars]
LOG_LEVEL = "warn"
MESH_MAX_AGENTS = "1000"

[[env.production.d1_databases]]
binding = "DB"
database_name = "poke-mesh-db-production"
database_id = "PLACEHOLDER_PROD_D1_ID"

[[env.production.kv_namespaces]]
binding = "MESH_CACHE"
id = "PLACEHOLDER_PROD_KV_ID"
